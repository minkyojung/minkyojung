name: Update GitHub Stats Gist

on:
  schedule:
    - cron: "0 0 * * *" # 매일 자정에 자동 업데이트
  workflow_dispatch:

jobs:
  update-gist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update gist
        uses: bokub/github-stats-box@master
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
